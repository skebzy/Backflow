[server]
response_server_header = "Backflow"
trusted_proxies = [
  "173.245.48.0/20",
  "103.21.244.0/22",
  "103.22.200.0/22",
  "103.31.4.0/22",
  "141.101.64.0/18",
  "108.162.192.0/18",
  "190.93.240.0/20",
  "188.114.96.0/20",
  "197.234.240.0/22",
  "198.41.128.0/17",
  "162.158.0.0/15",
  "104.16.0.0/13",
  "104.24.0.0/14",
  "172.64.0.0/13",
  "131.0.72.0/22",
  "2400:cb00::/32",
  "2606:4700::/32",
  "2803:f800::/32",
  "2405:b500::/32",
  "2405:8100::/32",
  "2a06:98c0::/29",
  "2c0f:f248::/32",
]
client_ip_headers = ["CF-Connecting-IPv6", "CF-Connecting-IP", "True-Client-IP"]
strict_proxy_headers = true

[[server.listeners]]
addr = "0.0.0.0:8080"

[primary]
name = "origin"
host_header = "app.internal"
sni = "app.internal"
use_tls = false
preserve_original_host = true
peers = [
  "127.0.0.1:9000",
]

[sinkhole]
enabled = false
mode = "local"
local_status = 200
local_body = "<html><body><h1>ok</h1></body></html>"
local_content_type = "text/html; charset=utf-8"
local_headers = { "Server" = "nginx", "CF-Cache-Status" = "DYNAMIC" }
delay_ms = 250
jitter_ms = 1000

[health_checks]
enabled = true
frequency_secs = 3

[filters]
default_action = "reject"
allow_ips = []
block_ips = []
allow_hosts = ["app.example.com"]
block_hosts = []
allow_path_prefixes = ["/", "/api/", "/assets/"]
require_host_header = true
require_user_agent = false
allow_methods = ["GET", "HEAD", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
block_user_agents = ["masscan", "zgrab", "sqlmap"]
block_header_names = ["x-original-url", "x-rewrite-url"]
block_path_suffixes = ["/.env", "/.git/config", "/id_rsa", "/backup.sql"]
block_file_extensions = [".env", ".sql", ".bak", ".pem", ".key", ".zip"]
block_query_keys = ["token", "password", "cmd", "exec", "debug"]
trusted_user_agents = []
skip_rate_limit_paths = ["/healthz", "/readyz"]
strip_connection_headers = true
reject_underscored_headers = true
reject_multiple_host_headers = true
reject_conflicting_content_headers = true
reject_invalid_host_header = true
reject_invalid_content_length = true
reject_multiple_content_length_headers = true
reject_multiple_transfer_encoding_headers = true
reject_non_chunked_transfer_encoding = true
reject_malformed_encoding = true
reject_path_traversal = true
reject_invalid_path = true
max_header_count = 96
max_header_bytes = 16384
max_path_length = 2048
max_path_segments = 48
max_query_length = 4096
max_query_params = 64
max_content_length = 8388608
max_empty_headers = 8
max_repeated_path_chars = 24
max_suspicion_score = 5
empty_user_agent_score = 1
odd_method_score = 2
encoded_path_score = 2
attack_path_score = 3
attack_query_score = 3
malformed_encoding_score = 2
suspicious_method_override_score = 2
header_spike_score = 2
query_spike_score = 2
empty_header_score = 1
blocked_ua_score = 3
repeated_path_score = 2
suspicious_header_score = 2
suspicious_query_key_score = 2
sensitive_extension_score = 3
reject_status = 403
reject_body = "blocked by backflow"

[rate_limit]
enabled = true
requests_per_period = 240
burst = 480
period_secs = 10
exceeded_action = "reject"
reject_status = 429
reject_body = "rate limit exceeded"

[adaptive]
enabled = true
max_concurrent_requests_per_ip = 48
concurrency_action = "reject"
strike_threshold = 6
ban_secs = 300
ban_action = "blackhole"

[blackhole]
delay_ms = 1200
jitter_ms = 3000
log = true

[trace]
enabled = true
request_id_header = "X-Request-ID"
trust_incoming_request_id = false
inject_correlation_header = true

[response]
headers = {
  "X-Content-Type-Options" = "nosniff",
  "X-Frame-Options" = "DENY",
  "Referrer-Policy" = "same-origin",
  "Permissions-Policy" = "geolocation=(), microphone=(), camera=()"
}
remove_headers = ["x-powered-by", "server-timing", "alt-svc"]

[maintenance]
enabled = false
status = 503
body = "temporarily unavailable"
allow_ips = ["127.0.0.1", "::1"]
allow_path_prefixes = ["/healthz", "/readyz"]

[internal_endpoints]
enabled = true
health_path = "/healthz"
ready_path = "/readyz"

[[protected_paths]]
path_prefix = "/admin"
allow_ips = ["127.0.0.1", "::1", "10.0.0.0/8"]
action = "reject"
reject_status = 403
reject_body = "admin access denied"

[backend]
inject_headers = {}
set_forwarded_port = true
forwarded_proto_header = "X-Forwarded-Proto"
preserve_trusted_proto_header = true
set_forwarded_header = true
strip_inbound_internal_headers = [
  "X-Backflow-Client-IP",
  "X-Backflow-Decision",
  "X-Backflow-Pool",
  "X-Forwarded-For",
  "X-Forwarded-Host",
  "X-Forwarded-Proto",
  "X-Forwarded-Port",
  "X-Real-IP",
  "True-Client-IP",
  "CF-Connecting-IP",
  "CF-Connecting-IPv6",
  "Forwarded",
]
