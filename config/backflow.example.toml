[server]
response_server_header = "Backflow"
trusted_proxies = []
client_ip_headers = ["CF-Connecting-IPv6", "CF-Connecting-IP", "True-Client-IP", "X-Forwarded-For", "X-Real-IP"]
strict_proxy_headers = true

[[server.listeners]]
addr = "0.0.0.0:8080"

#[[server.listeners]]
#addr = "0.0.0.0:8443"
#[server.listeners.tls]
#cert_path = "certs/fullchain.pem"
#key_path = "certs/privkey.pem"
#enable_h2 = true

[primary]
name = "origin"
host_header = "origin.internal"
sni = "origin.internal"
use_tls = false
preserve_original_host = true
peers = [
  # Replace these demo localhost peers with your real origin addresses.
  "127.0.0.1:9000",
  "127.0.0.1:9001",
]

[pools.api]
name = "api"
host_header = "api.internal"
sni = "api.internal"
use_tls = false
preserve_original_host = true
peers = [
  "127.0.0.1:9200",
  "127.0.0.1:9201",
]

[[routes]]
target_pool = "api"
host_equals = "api.example.com"

[[routes]]
target_pool = "api"
path_prefix = "/api/"
rewrite_prefix = "/"

[sinkhole]
enabled = true
mode = "local"
local_status = 200
local_body = "<html><body><h1>ok</h1></body></html>"
local_content_type = "text/html; charset=utf-8"
local_headers = { "Server" = "nginx", "X-Robots-Tag" = "noindex" }
delay_ms = 250
jitter_ms = 1000

[health_checks]
enabled = true
frequency_secs = 3

[filters]
default_action = "reject"
allow_ips = ["127.0.0.1"]
block_ips = ["2001:db8:dead::/48"]
allow_hosts = ["example.com", "www.example.com"]
block_hosts = []
allow_path_prefixes = ["/", "/api/", "/assets/"]
require_host_header = true
require_user_agent = false
allow_methods = ["GET", "HEAD", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
block_user_agents = ["curl/", "python-requests", "go-http-client", "masscan", "zgrab"]
block_header_names = ["x-original-url", "x-rewrite-url"]
block_path_patterns = [
  "/.env",
  "/.git/",
  "/.git/config",
  "/.svn/",
  "/.hg/",
  "/wp-admin",
  "/wp-login.php",
  "/xmlrpc.php",
  "/phpmyadmin",
  "/vendor/phpunit",
  "/cgi-bin/",
  "/server-status",
  "/actuator/env",
  "/actuator/heapdump",
  "/autodiscover/autodiscover.xml",
  "/.aws/",
  "/.ssh/",
]
block_path_suffixes = [
  "/.env",
  "/.git/config",
  "/id_rsa",
  "/docker-compose.yml",
  "/backup.sql",
]
block_file_extensions = [".env", ".sql", ".bak", ".pem", ".key", ".zip"]
block_query_patterns = [
  "union select",
  "<script",
  "%3cscript",
  "/etc/passwd",
  "cmd.exe",
  "powershell",
  "${jndi:",
  "%24%7bjndi",
  "information_schema",
  "waitfor delay",
  "benchmark(",
  "sleep(",
  ";wget ",
  ";curl ",
  "|wget ",
  "|curl ",
  "<?php",
]
block_query_keys = ["token", "password", "cmd", "exec", "debug"]
strip_connection_headers = true
reject_underscored_headers = true
reject_multiple_host_headers = true
reject_conflicting_content_headers = true
reject_invalid_host_header = true
reject_invalid_content_length = true
reject_multiple_content_length_headers = true
reject_multiple_transfer_encoding_headers = true
reject_non_chunked_transfer_encoding = true
reject_malformed_encoding = true
reject_path_traversal = true
reject_invalid_path = true
max_header_count = 96
max_header_bytes = 16384
max_path_length = 2048
max_path_segments = 48
max_query_length = 4096
max_query_params = 64
max_content_length = 8388608
max_empty_headers = 8
max_repeated_path_chars = 24
max_suspicion_score = 5
empty_user_agent_score = 1
odd_method_score = 2
encoded_path_score = 2
attack_path_score = 3
attack_query_score = 3
malformed_encoding_score = 2
suspicious_method_override_score = 2
header_spike_score = 2
query_spike_score = 2
empty_header_score = 1
blocked_ua_score = 3
repeated_path_score = 2
suspicious_header_score = 2
suspicious_query_key_score = 2
sensitive_extension_score = 3
reject_status = 403
reject_body = "blocked by backflow"

[rate_limit]
enabled = true
requests_per_period = 120
burst = 240
period_secs = 10
exceeded_action = "sinkhole"
reject_status = 429
reject_body = "rate limit exceeded"

[adaptive]
enabled = true
max_concurrent_requests_per_ip = 24
concurrency_action = "sinkhole"
strike_threshold = 6
ban_secs = 300
ban_action = "blackhole"

[blackhole]
delay_ms = 1500
jitter_ms = 3500
log = true

[trace]
enabled = true
request_id_header = "X-Request-ID"
trust_incoming_request_id = false
inject_correlation_header = true

[response]
headers = {
  "X-Content-Type-Options" = "nosniff",
  "X-Frame-Options" = "DENY",
  "Referrer-Policy" = "same-origin",
  "Permissions-Policy" = "geolocation=(), microphone=(), camera=()"
}
remove_headers = ["x-powered-by", "server-timing", "alt-svc"]

[maintenance]
enabled = false
status = 503
body = "temporarily unavailable"
allow_ips = ["127.0.0.1", "::1"]
allow_path_prefixes = ["/healthz", "/readyz"]

[internal_endpoints]
enabled = true
health_path = "/healthz"
ready_path = "/readyz"

[[protected_paths]]
path_prefix = "/admin"
allow_ips = ["127.0.0.1", "::1", "10.0.0.0/8"]
action = "reject"
reject_status = 403
reject_body = "admin access denied"

[backend]
inject_headers = { "X-Backflow-Origin-Auth" = "replace-me" }
set_forwarded_port = true
forwarded_proto_header = "X-Forwarded-Proto"
preserve_trusted_proto_header = true
set_forwarded_header = true
strip_inbound_internal_headers = [
  "X-Backflow-Client-IP",
  "X-Backflow-Decision",
  "X-Backflow-Pool",
  "X-Forwarded-For",
  "X-Forwarded-Host",
  "X-Forwarded-Proto",
  "X-Forwarded-Port",
  "X-Real-IP",
  "True-Client-IP",
  "CF-Connecting-IP",
  "CF-Connecting-IPv6",
  "Forwarded",
]
